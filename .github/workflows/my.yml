name: Gerar Mancha Inundacao

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install --upgrade pip
          pip install rasterio geopandas pandas requests scipy shapely fiona

      - name: Executar Script
        run: |
          mkdir -p output
          python gerador_mancha.py

      - name: Upload do Shapefile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mancha_Resultado
          path: output/
          if-no-files-found: error
