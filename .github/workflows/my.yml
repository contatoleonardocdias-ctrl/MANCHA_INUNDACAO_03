name: Gerar Mancha Estavel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bibliotecas
        run: |
          pip install --upgrade pip
          # Adicionado gdown para o download do Google Drive
          pip install rasterio geopandas pandas requests scipy shapely fiona gdown

      - name: Executar
        run: |
          mkdir -p output
          # O gdown precisa que o arquivo de destino não exista para baixar limpo
          rm -f mde_final_utm.tif 
          python gerador_mancha.py

      - name: Download Resultado
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mancha_SHP
          path: output/
