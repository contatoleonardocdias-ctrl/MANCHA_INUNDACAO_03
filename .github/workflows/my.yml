name: Gerar Relatorio Inundacao

on:
  workflow_dispatch: # Permite rodar manualmente clicando no botão

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev

      - name: Instalar bibliotecas Python
        run: |
          pip install --upgrade pip
          pip install rasterio geopandas pandas requests fiona pyproj matplotlib contextily shapely pyyaml

      - name: Executar Script
        run: python gerador_mancha.py

      - name: Upload dos Produtos (SHP e PDF)
        if: always() # Garante que tente salvar mesmo se houver avisos
        uses: actions/upload-artifact@v4
        with:
          name: Produtos_Inundacao
          path: output/
          if-no-files-found: error # Faz o workflow avisar se a pasta estiver vazia
