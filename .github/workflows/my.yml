name: Gerar Mancha SHP Refinada

on:
  workflow_dispatch:

jobs:
  run_analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev

      - name: Instalar bibliotecas Python
        run: |
          pip install --upgrade pip
          pip install wheel
          pip install rasterio geopandas pandas requests fiona shapely pysheds scipy scikit-image

      - name: Executar Script
        run: |
          mkdir -p output
          python gerador_mancha.py

      - name: Upload dos Resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mancha_Inundacao_Refinada
          path: output/
          if-no-files-found: error
