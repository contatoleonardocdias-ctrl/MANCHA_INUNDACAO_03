name: Dam Break Automation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run_simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Install Python Libraries
        run: |
          pip install numpy pandas rasterio geopandas shapely gdown

      - name: Run Dam Break Script
        run: python gerador_mancha.py

      - name: Save and Push Results
        run: |
          git config --global user.name 'DamBreakBot'
          git config --global user.email 'bot@noreply.github.com'
          
          # Garante que a pasta existe antes de tentar adicionar
          mkdir -p manchas_output
          
          # Só tenta fazer o commit se existirem arquivos .geojson
          if ls manchas_output/*.geojson 1> /dev/null 2>&1; then
            git add manchas_output/*.geojson
            git commit -m "Bot: Novas manchas geradas automaticamente"
            git push
          else
            echo "Nenhuma mancha foi gerada. Verifique os logs do script Python."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
