name: Dam Break Automatizado - Resolucao Erro NASA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run_simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev
          pip install numpy rasterio geopandas shapely fiona requests

      - name: Run Script
        run: python gerador_mancha.py

      - name: Save Results
        run: |
          git config --global user.name 'DamBreakBot'
          git config --global user.email 'bot@noreply.github.com'
          mkdir -p manchas_output
          if [ -n "$(ls -A manchas_output/*.geojson 2>/dev/null)" ]; then
            git add manchas_output/*.geojson
            git commit -m "Bot: Manchas geradas via API OpenTopography"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
