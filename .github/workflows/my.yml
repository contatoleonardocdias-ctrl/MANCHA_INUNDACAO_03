name: Gerar Mancha Estavel

on:
  workflow_dispatch: # Botão para rodar manualmente na aba Actions

jobs:
  run_analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev

      - name: Instalar bibliotecas Python
        run: |
          pip install --upgrade pip
          pip install wheel
          # Bibliotecas padrão e estáveis de geoprocessamento
          pip install rasterio geopandas pandas requests fiona shapely scipy

      - name: Executar Gerador de Mancha
        run: |
          # Garante que a pasta output exista
          mkdir -p output
          python gerador_mancha.py

      - name: Upload dos Resultados (Shapefile)
        if: always() # Faz o upload mesmo se o script Python der erro, para análise
        uses: actions/upload-artifact@v4
        with:
          name: Mancha_Inundacao_Resultado
          path: output/ # Pasta onde o SHP foi salvo
          if-no-files-found: error
