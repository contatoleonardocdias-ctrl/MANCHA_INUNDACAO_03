name: Gerar Mancha SHP

on:
  workflow_dispatch: # Permite rodar manualmente

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev

      - name: Instalar bibliotecas Python
        run: |
          pip install --upgrade pip
          # Definindo flags para garantir a instalação das libs geo
          pip install wheel
          pip install rasterio geopandas pandas requests fiona shapely

      - name: Executar Script
        run: |
          # Criar a pasta de saída para o artifact não falhar
          mkdir -p output
          python gerador_mancha.py
          # Movemos os arquivos gerados para a pasta output (todos que começam com MANCHA)
          mv MANCHA_NOVO_03* output/

      - name: Upload dos Produtos (Apenas SHP)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Produtos_Inundacao_SHP
          # Aqui ele vai pegar a pasta com os 4 arquivos do Shapefile
          path: output/
          if-no-files-found: error
